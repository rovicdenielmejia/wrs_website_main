<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Job Seeker Login - Workforce Recruitment Solutions. Access your profile, job matches, and application tracking.">
    <title>Job Seeker Login | Workforce Recruitment Solutions</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/styles-portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Main navigation">
            <div class="container">
                <div class="nav-brand">
                    <h1><a href="../home.html" class="nav-brand-link">
                        <img src="../Assets/WRS LOGO.png" alt="Workforce Recruitment Solutions" class="nav-logo">
                        <span class="nav-brand-title">Workforce Recruitment Solutions</span>
                    </a></h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="../home.html">Home</a></li>
                    <li><a href="candidate-register.html">Register</a></li>
                    <li><a href="../employer/employer-login.html">Employers</a></li>
                </ul>
                <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main id="main-content" class="auth-page">
        <div class="auth-card">
            <h1>Job Seeker Login</h1>
            <p class="auth-subtitle">Access your profile, job matches, and application tracking.</p>
            <div class="auth-tabs">
                <a href="candidate-login.html" class="active">Login</a>
                <a href="candidate-register.html">Register</a>
            </div>
            <form id="candidate-login-form">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <div id="login-error" class="form-message" style="color: #e07a87; display: none; margin-bottom: 1rem;"></div>
                <button type="submit" class="cta-button">Login</button>
            </form>
            <p class="auth-footer">
                New job seeker? <a href="candidate-register.html">Register here</a>.<br>
                <a href="../home.html">Back to home</a>
            </p>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('candidate-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const result = await loginWithApi(email, password, 'candidate');
            const errEl = document.getElementById('login-error');
            if (result.success) {
                window.location.href = 'candidate-dashboard.html';
            } else {
                errEl.textContent = result.error || 'Login failed.';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
