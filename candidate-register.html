<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Job Seeker Registration - Workforce Recruitment Solutions. Create your profile and get matched to opportunities.">
    <title>Job Seeker Register | Workforce Recruitment Solutions</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
        <nav class="navbar" aria-label="Main navigation">
            <div class="container">
                <div class="nav-brand">
                    <h1><a href="home.html" class="nav-brand-link">
                        <img src="Assets/WRS LOGO.png" alt="Workforce Recruitment Solutions" class="nav-logo">
                        <span class="nav-brand-title">Workforce Recruitment Solutions</span>
                    </a></h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="candidate-login.html">Login</a></li>
                    <li><a href="employer-register.html">Employers</a></li>
                </ul>
                <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main id="main-content" class="auth-page">
        <div class="auth-card">
            <h1>Job Seeker Registration</h1>
            <p class="auth-subtitle">Build your profile. Get matched to opportunities. LinkedIn/Google login coming soon.</p>
            <div class="auth-tabs">
                <a href="candidate-login.html">Login</a>
                <a href="candidate-register.html" class="active">Register</a>
            </div>
            <form id="candidate-register-form">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+63 9XX XXX XXXX">
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
                </div>
                <div id="register-error" class="form-message" style="color: #e07a87; display: none; margin-bottom: 1rem;"></div>
                <button type="submit" class="cta-button">Register</button>
            </form>
            <p class="auth-footer">
                Already have an account? <a href="candidate-login.html">Login</a>.<br>
                <a href="home.html">Back to home</a>
            </p>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('candidate-register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value
            };
            const result = registerCandidate(data);
            const errEl = document.getElementById('register-error');
            if (result.success) {
                window.location.href = 'candidate-dashboard.html';
            } else {
                errEl.textContent = result.error || 'Registration failed.';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
